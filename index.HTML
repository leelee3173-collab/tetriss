<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Ultimate Mobile</title>
    <style>
        * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #1a1a1e; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; }
        
        /* 레이아웃 */
        .game-layout { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 450px; height: 100%; padding: 10px; }
        .header { display: flex; justify-content: space-around; width: 100%; margin-bottom: 10px; background: #25252b; padding: 10px; border-radius: 10px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; color: #0DC2FF; }

        .main-container { position: relative; display: flex; justify-content: center; width: 100%; flex-grow: 1; }
        canvas#tetris { background: #000; border: 3px solid #333; border-radius: 5px; height: 70vh; width: auto; aspect-ratio: 10/20; max-height: 600px; }
        
        #next { background: #000; border: 1px solid #444; width: 60px; height: 60px; margin-top: 5px; }

        /* 시작 및 오버 화면 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { padding: 15px 40px; font-size: 20px; background: #FF0D72; border: none; border-radius: 50px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 13, 114, 0.4); }
        
        .controls-hint { font-size: 11px; color: #555; margin-top: 10px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <h1 style="color: #FF0D72; letter-spacing: 5px;">TETRIS</h1>
        <p style="color: #888; margin-bottom: 30px;">Mobile & PC Version</p>
        <button id="start-btn" class="btn">START GAME</button>
        <div style="margin-top: 30px; color: #555; font-size: 12px; text-align: center;">
            PC: Arrows / Space<br>
            Mobile: Swipe & Tap
        </div>
    </div>

    <div class="game-layout">
        <div class="header">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <canvas id="next" width="100" height="100"></canvas>
            </div>
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div id="level" class="stat-value">1</div>
            </div>
        </div>

        <div class="main-container">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="controls-hint">
            Swipe Left/Right: Move | Tap: Rotate<br>Swipe Down: Hard Drop
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        nextContext.scale(25, 25);

        const bgm = document.getElementById('bgm');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
        let arena = createMatrix(12, 20);
        let player = { pos: {x: 0, y: 0}, matrix: null };
        let nextPiece = null;
        let score = 0, level = 1, lineCount = 0, dropCounter = 0, dropInterval = 1000, lastTime = 0, gameRunning = false;

        // --- 핵심 로직 ---
        function createPiece(type) {
            if (type === 'I') return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
            if (type === 'L') return [[0, 5, 0], [0, 5, 0], [0, 5, 5]];
            if (type === 'J') return [[0, 6, 0], [0, 6, 0], [6, 6, 0]];
            if (type === 'O') return [[7, 7], [7, 7]];
            if (type === 'Z') return [[4, 4, 0], [0, 4, 4], [0, 0, 0]];
            if (type === 'S') return [[0, 3, 3], [3, 3, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
        }

        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, getGhostPos(), true);
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset, isGhost = false, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        if (isGhost) {
                            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                            ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        } else {
                            ctx.fillStyle = colors[value];
                            ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                            ctx.lineWidth = 0.05;
                            ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        }
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            matrix.forEach(row => row.reverse());
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (!nextPiece) nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = nextPiece;
            nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                vibrate(500);
                bgm.pause();
                bgm.currentTime = 0;
                gameRunning = false;
                overlay.style.display = 'flex';
                document.querySelector('h1').innerText = "GAME OVER";
                arena.forEach(row => row.fill(0));
                score = 0; level = 1; lineCount = 0; dropInterval = 1000;
            }
            drawNext();
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                vibrate(30);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function arenaSweep() {
            let rowCount = 1;
            let cleared = false;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                score += rowCount * 10;
                lineCount++;
                rowCount *= 2;
                cleared = true;
                if (lineCount >= level * 10) {
                    level++;
                    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                }
            }
            if (cleared) vibrate([100, 50, 100]);
        }

        function getGhostPos() {
            const ghost = { pos: {x: player.pos.x, y: player.pos.y}, matrix: player.matrix };
            while (!collide(arena, ghost)) ghost.pos.y++;
            ghost.pos.y--;
            return ghost.pos;
        }

        function drawNext() {
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            drawMatrix(nextPiece, {x: 1, y: 1}, false, nextContext);
        }

        function updateScore() {
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        // --- 입력 제어 ---
        let touchX = 0, touchY = 0, moved = false;
        canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; moved = false; }, {passive: false});
        canvas.addEventListener('touchmove', e => {
            let dx = e.touches[0].clientX - touchX;
            let dy = e.touches[0].clientY - touchY;
            if (Math.abs(dx) > 35) {
                player.pos.x += dx > 0 ? 1 : -1;
                if (collide(arena, player)) player.pos.x -= dx > 0 ? 1 : -1;
                else vibrate(15);
                touchX = e.touches[0].clientX; moved = true;
            }
            if (dy > 70) {
                player.pos.y = getGhostPos().y;
                playerDrop();
                touchY = e.touches[0].clientY; moved = true;
            }
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { if (!moved) { rotate(player.matrix); vibrate(25); let o=1; while(collide(arena, player)){ player.pos.x+=o; o=-(o+(o>0?1:-1)); } } });

        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.keyCode === 37) { player.pos.x--; if(collide(arena, player)) player.pos.x++; }
            else if (e.keyCode === 39) { player.pos.x++; if(collide(arena, player)) player.pos.x--; }
            else if (e.keyCode === 40) playerDrop();
            else if (e.keyCode === 38) { rotate(player.matrix); let o=1; while(collide(arena, player)){ player.pos.x+=o; o=-(o+(o>0?1:-1)); } }
            else if (e.keyCode === 32) { player.pos.y = getGhostPos().y; playerDrop(); }
        });

        // --- 실행 ---
        function update(time = 0) {
            if (!gameRunning) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            gameRunning = true;
            bgm.play();
            playerReset();
            update();
        });

        updateScore();
    </script>
</body>
</html>
